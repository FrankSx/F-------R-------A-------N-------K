<script>
((() => {
  const w = document.getElementById('w');
  const parts = [...document.querySelectorAll('script[type="text/plain"]')];
  
  // one-time priming - decrypt in registers only
  const wake = parts.map((el,i) => {
    const k = +el.dataset.k;
    const d = atob(el.textContent);
    let o = '';
    for(let j=0;j<d.length;j++) o += String.fromCharCode(d.charCodeAt(j) ^ k);
    el.textContent = ''; el.remove();
    // progressive removal
    setTimeout(()=>{}, i*180);
    return o;
  });

  // pop together in memory
  wake.forEach(s => {
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.innerHTML = s;
    while(g.firstChild) w.appendChild(g.firstChild);
  });

  // FrankSx signature - only in memory, never in source
  const sig = ['F','r','a','n','k','S','x'].join('') + ' :: ' + ['m','o','d','e','r','n',' ','m','a','s','t','e','r','p','i','e','c','e'].join('');
  
  // unicode glitching wake - emojis, ascii, noise, swelling, rotating
  const core = w.querySelector('#core text');
  const g1 = w.querySelector('#g1 text');
  const g2 = w.querySelector('#g2 text');
  const shards = w.querySelector('#shards');
  
  const glyphs = [...'/\\|{}[]<>_!░▒▓█01λΔ∴∵⟐⟡⌁⌇','😵‍💫','🌀','▓','▒','░','█','✦','✧','⟡','⌬','∎','⟁','⬙','⬟','⬢'];
  const emojis = ['🫥','👁️','💀','🪞','⚡','🕳️','🧿','🌀','✴️','🔻'];
  
  const glitch = () => {
    const base = '/\/\oder/\/';
    const h = 0.12 + Math.random()*0.15;
    const t = [...base].map(c => Math.random()<h ? glyphs[Math.random()*glyphs.length|0] : c).join('');
    core.textContent = t;
    g1.textContent = t;
    g2.textContent = t;
    
    // swelling rotating
    const s = 0.9 + Math.random()*0.3;
    const r = -3 + Math.random()*6;
    core.setAttribute('transform', `scale(${s}) rotate(${r})`);
    
    // unicode noise burst
    if(Math.random()<0.3){
      const e = document.createElementNS('http://www.w3.org/2000/svg','text');
      e.setAttribute('x', Math.random()*1920);
      e.setAttribute('y', Math.random()*1080);
      e.setAttribute('fill', ['#39ff14','#ff2bd6','#00eaff'][Math.random()*3|0]);
      e.setAttribute('font-size', 20+Math.random()*80);
      e.setAttribute('opacity', 0.2+Math.random()*0.6);
      e.setAttribute('transform', `rotate(${Math.random()*360})`);
      e.textContent = emojis[Math.random()*emojis.length|0] + glyphs[Math.random()*glyphs.length|0];
      shards.appendChild(e);
      setTimeout(()=>e.remove(), 800+Math.random()*1200);
    }
  };
  
  const loop = setInterval(glitch, 110);
  
  // progressive erasure - leave only ()
  setTimeout(()=>{
    // kill source references
    document.querySelectorAll('script').forEach(s=>{try{s.remove()}catch(e){}});
    // overwrite bootstrap with empty function
    const noop = ()=>{};
    for(let k in window){ try{ if(typeof window[k]==='function' && window[k].toString().includes('atob')) window[k]=noop; }catch(e){} }
    // final wake signature in console only
    console.log('%c'+sig, 'color:#39ff14;background:#000;font:900 16px monospace');
    console.log('%c()','color:#666');
  }, 3200);
  
  // after priming, show only encrypted runtime
  window._ = () => {};
})())();
</script>
