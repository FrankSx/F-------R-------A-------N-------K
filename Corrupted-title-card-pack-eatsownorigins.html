<script>
(() => {
  const key = 0x5A;
  const dec = s => atob(s).split('').map(ch => String.fromCharCode(ch.charCodeAt(0) ^ key)).join('');
  
  // one-time unwrap
  const wall = document.getElementById('wall');
  const frags = ['a','b','c'].map(id => {
    const el = document.getElementById(id);
    const html = dec(el.textContent.trim());
    el.remove(); // remove source immediately
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.innerHTML = html;
    return g.firstChild;
  });
  
  // pop together
  frags.forEach(f => wall.appendChild(f));
  
  // progressive amnesia
  setTimeout(() => {
    document.querySelectorAll('script').forEach(s => s.textContent = '');
  }, 1200);
  
  // living mutation (only in memory now)
  const core = wall.querySelector('#core text');
  const glyphs = '/\\|{}[]<>_!░▒▓█';
  setInterval(() => {
    core.textContent = core.textContent.split('').map(ch => Math.random()<0.09 ? glyphs[Math.random()*glyphs.length|0] : ch).join('');
    core.setAttribute('filter','url(#f)');
  }, 130);
  
  // spawn shards into memory only
  const shards = wall.querySelector('#shards');
  const dna = ['dpl_C1hViaDE1P6dS3Qg93QeXwytH6NF','self.__next_f.push([1,','ar_AR.2964d224.json','المحتوى من إنشاء المستخدم'];
  setInterval(() => {
    const t = document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x', Math.random()*1920);
    t.setAttribute('y', Math.random()*1080);
    t.setAttribute('fill', ['#39ff14','#ff2bd6','#00eaff'][Math.random()*3|0]);
    t.setAttribute('font-family','monospace');
    t.setAttribute('font-size', 14 + Math.random()*32);
    t.setAttribute('opacity', 0.3 + Math.random()*0.5);
    t.textContent = dna[Math.random()*dna.length|0];
    shards.appendChild(t);
    if(shards.children.length > 40) shards.removeChild(shards.firstChild);
  }, 800);
  
  // self-destruct bootstrap after 3s
  setTimeout(() => {
    const scripts = Array.from(document.scripts);
    scripts.forEach(s => s.remove());
    // leave only encrypted wake in memory
    console.log('%c wake active','color:#39ff14;background:#000');
  }, 3000);
})();
