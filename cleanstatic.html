  <defs>
    <pattern id="scan" width="1920" height="4" patternUnits="userSpaceOnUse">
      <rect width="1920" height="1" fill="#f2f2f2" opacity="0.04"/>
      <rect y="2" width="1920" height="1" fill="#f2f2f2" opacity="0.03"/>
    </pattern>
    <filter id="warp" x="-20%" y="-30%" width="140%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3" seed="3" stitchTiles="stitch" result="n">
        <animate attributeName="seed" values="1;7;3;9;5" dur="0.4s" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="14" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="tear1">
      <rect x="0" y="480" width="1920" height="120">
        <animate attributeName="y" values="480;510;460;530;480" dur="0.14s" repeatCount="indefinite"/>
        <animate attributeName="height" values="120;60;180;40;120" dur="0.37s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="tear2">
      <rect x="0" y="550" width="1920" height="130">
        <animate attributeName="y" values="550;520;580;540;550" dur="0.17s" repeatCount="indefinite"/>
        <animate attributeName="height" values="130;190;70;150;130" dur="0.29s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

    <text id="core" x="960" y="540" font-size="180" fill="#39ff14" filter="url(#glow)" style="font-weight:900; letter-spacing:-8px;">/\/\oder/\/</text>
    <use href="#core" x="-4" y="-2" fill="#ff2bd6" opacity="0.9" clip-path="url(#tear1)"/>
    <use href="#core" x="4" y="2" fill="#00eaff" opacity="0.9" clip-path="url(#tear2)"/>
  </g>

  <rect width="1920" height="1080" fill="url(#scan)" pointer-events="none"/>
  <rect width="1920" height="1080" fill="black" opacity="0.15" style="mix-blend-mode:multiply" pointer-events="none"/>

  <script type="application/ecmascript"><![CDATA[
    const core = document.getElementById('core');
    const original = '/\\/\\oder/\\/'; 
    const glyphs = '/\\|{}[]<>_!░▒▓█';
    const shards = Array.from(document.querySelectorAll('.shard'));
    function rnd(a,b){return Math.random()*(b-a)+a}
    setInterval(()=>{
      let s='';
      for(let i=0;i<original.length;i++){
        s += Math.random()<0.08 ? glyphs[Math.floor(Math.random()*glyphs.length)] : original[i];
      }
      core.textContent = s;
      shards.forEach(t=>{
        if(Math.random()<0.15){
          const nx = rnd(40,1880);
          const ny = rnd(40,1040);
          t.setAttribute('x', nx);
          t.setAttribute('y', ny);
          t.setAttribute('transform', 'rotate('+rnd(-28,28)+' '+nx+' '+ny+')');
          t.setAttribute('opacity', rnd(0.3,0.8).toFixed(2));
        }
      });
    },120);
  ]]></script>
